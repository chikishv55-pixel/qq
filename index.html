<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Магазин одежды · Уведомления продавцу</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        /* Стили из предыдущего ответа (оставляем без изменений) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.4;
            font-weight: 400;
            min-height: 100vh;
            padding: 18px 16px 32px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding: 8px 0;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background-color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            font-size: 24px;
            color: #8e8e93;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #eaeaea;
            color: #555;
            font-weight: 500;
            font-size: 22px;
            text-transform: uppercase;
        }

        .user-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #000;
            line-height: 1.3;
        }

        .user-username {
            font-size: 14px;
            color: #6c6c70;
            margin-top: 2px;
            font-weight: 400;
        }

        .error-message {
            background-color: #fef2f0;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 15px;
            color: #bf3b2c;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(191, 59, 44, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            color: #1d1d1f;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .product-card {
            background-color: #ffffff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #f0f0f0;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 24px -10px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1.1;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 40px;
            position: relative;
        }

        .product-image svg {
            width: 60%;
            height: 60%;
            opacity: 0.7;
        }

        .like-button {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.15s ease;
            font-size: 20px;
            color: #8e8e93;
            z-index: 5;
        }

        .like-button.liked {
            color: #ff3b30;
        }

        .like-button:active {
            transform: scale(0.9);
        }

        .product-info {
            padding: 14px 12px 16px;
            background: white;
        }

        .product-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 6px;
            color: #1d1d1f;
            letter-spacing: -0.01em;
        }

        .product-price {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .buy-button {
            background-color: #000;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 0;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            letter-spacing: -0.01em;
        }

        .buy-button:hover {
            background-color: #333;
        }

        .buy-button:active {
            background-color: #444;
            transform: scale(0.98);
        }

        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background-color: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 10px 30px -6px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
            max-width: 80vw;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        @media (max-width: 380px) {
            .products-grid {
                gap: 12px;
            }
            .product-info {
                padding: 12px 10px 14px;
            }
        }

        .footer-note {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #c6c6c8;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <div class="profile-header" id="profileContainer"></div>
        <h2 class="section-title">Новинки недели</h2>
        <div class="products-grid" id="productsGrid"></div>
        <div class="footer-note">нажми купить — продавец получит уведомление</div>
    </div>

    <div id="toast" class="toast-message">👍</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        (function() 
            const YOUR_TELEGRAM_ID = 1445393854; // Замените на ваш ID (узнайте у @userinfobot)
            const BOT_TOKEN = '8393966699:AAF9vJ4VD6pnzqT7tQnmfsTSOUHFXMjmFLE';   // Замените на токен вашего бота от @BotFather
            // ============================================

            // Telegram инициализация
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                tg.setHeaderColor?.( '#ffffff' );
                tg.setBackgroundColor?.( '#ffffff' );
            }

            // Данные пользователя
            let user = null;
            let userError = false;

            try {
                if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    user = tg.initDataUnsafe.user;
                } else {
                    userError = true;
                    console.warn('Telegram user data not available');
                }
            } catch (e) {
                userError = true;
                console.error('Error parsing user data', e);
            }

            // Тост
            const toast = document.getElementById('toast');
            function showToast(text, duration = 2000) {
                toast.textContent = text;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // Функция отправки уведомления вам в Telegram
            async function notifySeller(purchaseData) {
                // Формируем красивое сообщение для вас
                const message = `
🛍 <b>Новый заказ!</b>

👕 Товар: ${purchaseData.product_name}
💰 Цена: ${purchaseData.price} ₽
🆔 Артикул: ${purchaseData.product_id}

👤 Покупатель: ${purchaseData.user?.first_name || 'Неизвестно'} ${purchaseData.user?.last_name || ''}
🔗 Username: ${purchaseData.user?.username ? '@' + purchaseData.user.username : 'нет'}
🆔 ID: ${purchaseData.user?.id || 'неизвестно'}

⏰ Время: ${new Date(purchaseData.timestamp).toLocaleString('ru-RU')}
                `.trim();

                // Отправляем через Telegram Bot API
                try {
                    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: YOUR_TELEGRAM_ID,
                            text: message,
                            parse_mode: 'HTML'
                        })
                    });

                    if (response.ok) {
                        showToast('✅ Заказ отправлен продавцу!', 2000);
                    } else {
                        console.error('Ошибка отправки уведомления');
                        showToast('⚠️ Ошибка, но мы знаем о заказе', 2000);
                    }
                } catch (error) {
                    console.error('Ошибка:', error);
                    showToast('⚠️ Ошибка отправки', 2000);
                }
            }

            // Профиль
            function getInitials(firstName, lastName) {
                if (!firstName) return '?';
                const first = firstName.charAt(0).toUpperCase();
                if (lastName) return first + lastName.charAt(0).toUpperCase();
                return first;
            }

            function renderProfile() {
                const container = document.getElementById('profileContainer');
                if (!container) return;

                if (!user && userError) {
                    container.innerHTML = `<div class="error-message">👤 Не удалось загрузить профиль</div>`;
                    return;
                }

                if (!user) {
                    container.innerHTML = `<div class="error-message">😺 Профиль временно недоступен</div>`;
                    return;
                }

                const firstName = user.first_name || '';
                const lastName = user.last_name || '';
                const username = user.username ? `@${user.username}` : '';
                const photoUrl = user.photo_url;
                const fullName = `${firstName} ${lastName}`.trim() || 'Пользователь Telegram';

                let avatarHtml = '';
                if (photoUrl && photoUrl.trim() !== '') {
                    avatarHtml = `<img class="avatar-img" src="${photoUrl}" alt="аватар" referrerpolicy="no-referrer">`;
                } else {
                    const initials = getInitials(firstName, lastName);
                    avatarHtml = `<div class="avatar-placeholder">${initials}</div>`;
                }

                container.innerHTML = `
                    <div class="avatar">${avatarHtml}</div>
                    <div class="user-info">
                        <span class="user-name">${fullName}</span>
                        ${username ? `<span class="user-username">${username}</span>` : ''}
                    </div>
                `;
            }

            // Товары
            const products = [
                { id: 'tshirt1', name: 'Хлопковая футболка', price: 2490, icon: '👕' },
                { id: 'jeans1', name: 'Классические джинсы', price: 4990, icon: '👖' },
                { id: 'sweater1', name: 'Оверсайз свитер', price: 3790, icon: '🧥' },
                { id: 'jacket1', name: 'Кожаная куртка', price: 12990, icon: '🧥' },
                { id: 'shirt1', name: 'Льняная рубашка', price: 3290, icon: '👔' },
                { id: 'pants1', name: 'Спортивные штаны', price: 2790, icon: '👖' },
                { id: 'raincoat1', name: 'Дождевик', price: 4590, icon: '🧥' },
                { id: 'longsleeve1', name: 'Базовый лонгслив', price: 2190, icon: '👕' }
            ];

            // Лайки
            let likedProducts = new Set();
            try {
                const saved = localStorage.getItem('liked_products');
                if (saved) {
                    likedProducts = new Set(JSON.parse(saved));
                }
            } catch (e) {}

            function saveLikes() {
                try {
                    localStorage.setItem('liked_products', JSON.stringify([...likedProducts]));
                } catch (e) {}
            }

            function toggleLike(productId, buttonElement) {
                if (likedProducts.has(productId)) {
                    likedProducts.delete(productId);
                    buttonElement.classList.remove('liked');
                    buttonElement.textContent = '🤍';
                } else {
                    likedProducts.add(productId);
                    buttonElement.classList.add('liked');
                    buttonElement.textContent = '❤️';
                }
                saveLikes();
            }

            // Обработчик покупки
            async function handleBuy(product, userInfo) {
                const purchaseData = {
                    action: 'buy',
                    product_id: product.id,
                    product_name: product.name,
                    price: product.price,
                    user: userInfo ? {
                        id: userInfo.id,
                        first_name: userInfo.first_name,
                        last_name: userInfo.last_name,
                        username: userInfo.username,
                    } : null,
                    timestamp: Date.now()
                };

                // Показываем тост
                showToast(`⏳ Оформляем заказ...`, 1000);

                // Отправляем уведомление вам
                await notifySeller(purchaseData);

                // Вибрация (если доступно)
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }

                // Если есть sendData, тоже отправляем (для совместимости)
                if (tg && typeof tg.sendData === 'function') {
                    setTimeout(() => {
                        tg.sendData(JSON.stringify(purchaseData));
                    }, 500);
                }
            }

            // Рендер карточек
            function renderProducts() {
                const grid = document.getElementById('productsGrid');
                if (!grid) return;

                let cardsHtml = '';

                products.forEach(product => {
                    const isLiked = likedProducts.has(product.id);
                    const likeSymbol = isLiked ? '❤️' : '🤍';
                    const likeClass = isLiked ? 'like-button liked' : 'like-button';

                    const svgPlaceholder = `<svg viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="6" width="32" height="32" rx="8" fill="#eaeaea"/><path d="M12 16 L28 16 L26 30 L14 30 L12 16Z" fill="#d0d0d0" opacity="0.8"/><circle cx="20" cy="24" r="4" fill="#b0b0b0"/></svg>`;

                    cardsHtml += `
                        <div class="product-card" data-product-id="${product.id}">
                            <div class="product-image">
                                ${svgPlaceholder}
                                <div class="${likeClass}" data-like-id="${product.id}">${likeSymbol}</div>
                            </div>
                            <div class="product-info">
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${product.price.toLocaleString('ru-RU')} ₽</div>
                                <button class="buy-button" data-buy-id="${product.id}">Купить</button>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = cardsHtml;

                document.querySelectorAll('.like-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const productId = btn.dataset.likeId;
                        toggleLike(productId, btn);
                    });
                });

                document.querySelectorAll('.buy-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const productId = btn.dataset.buyId;
                        const product = products.find(p => p.id === productId);
                        if (product) {
                            handleBuy(product, user);
                        }
                    });
                });
            }

            // Старт
            document.addEventListener('DOMContentLoaded', () => {
                renderProfile();
                renderProducts();
            });

            if (document.readyState === 'interactive' || document.readyState === 'complete') {
                renderProfile();
                renderProducts();
            }
        })();
    </script>
</body>
</html>
